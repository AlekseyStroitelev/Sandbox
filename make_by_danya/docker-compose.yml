version: '3'

services:
  zookeeper:
    image: docker-proxy.artifactory.tcsbank.ru/apache/kafka:3.9.2
    container_name: zookeeper
    environment:
      KAFKA_CFG_DATA_DIR: /var/lib/zookeeper/data
      KAFKA_CFG_DATA_LOG_DIR: /var/lib/zookeeper/log
      KAFKA_CFG_TICK_TIME: "2000"
      KAFKA_CFG_INIT_LIMIT: "5"
      KAFKA_CFG_SYNC_LIMIT: "2"
      KAFKA_CFG_CLIENT_PORT: "2181"
    ports:
      - "2181:2181"
    networks:
      - kafka_network

  kafka:
    image: docker-proxy.artifactory.tcsbank.ru/apache/kafka:3.9.2
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:19091
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_QUORUM: 1@zookeeper:19091
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_LOG_DIR: /var/lib/kafka/data
      KAFKA_CFG_LOG_FLUSH_INTERVAL_MS: 1000
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    ports:
      - "9092:9092"
    networks:
      - kafka_network

  schema-registry:
    image: docker-proxy.artifactory.tcsbank.ru/confluentinc/cp-schema-registry:7.8.6
    container_name: schema-registry
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    networks:
      - kafka_network

  akhq:
    image: docker-proxy.artifactory.tcsbank.ru/tchiotludo/akhq:0.26.0
    container_name: akhq
    depends_on:
      - kafka
      - zookeeper
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            my-kafka:
              properties:
                bootstrap.servers: "kafka:9092"
              schema-registry:
                url: "http://schema-registry:8081"
    ports:
      - "8080:8080"
    networks:
      - kafka_network

networks:
  kafka_network:
    driver: bridge