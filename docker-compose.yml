services:
  zookeeper:
    image: apache/kafka:3.9.2
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
      - "2888:2888"
      - "3888:3888"
    environment:
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    command: >
      /opt/kafka/bin/zookeeper-server-start.sh
      /opt/kafka/config/zookeeper.properties
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks:
      - kafka-network

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_OPTS: "-Dzookeeper.admin.enableServer=false"
    command: |
      bash -c '
      # Создаем конфигурацию Kafka
      cat > /opt/kafka/config/server.properties << "EOF"
      broker.id=1
      zookeeper.connect=zookeeper:2181
      listeners=PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      advertised.listeners=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      listener.security.protocol.map=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      inter.broker.listener.name=PLAINTEXT
      offsets.topic.replication.factor=1
      group.initial.rebalance.delay.ms=0
      transaction.state.log.min.isr=1
      transaction.state.log.replication.factor=1
      log.dirs=/tmp/kafka-logs
      zookeeper.connection.timeout.ms=18000
      EOF
      
      echo "Waiting for Zookeeper..."
      while ! nc -z zookeeper 2181; do
        sleep 2
      done
      
      echo "Zookeeper is ready. Starting Kafka..."
      exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
      '
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - kafka-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.6
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
      SCHEMA_REGISTRY_DEBUG: 'true'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - kafka-network

  akhq:
    image: tchiotludo/akhq:0.26.0
    container_name: akhq
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka:
              properties:
                bootstrap.servers: "kafka:29092"
              schema-registry:
                url: "http://schema-registry:8081"
    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge